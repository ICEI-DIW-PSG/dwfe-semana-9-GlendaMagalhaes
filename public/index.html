<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Streaming</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <div class="logo">🎬 Meu Streaming</div>
        <p class="tagline">Seu catálogo pessoal de filmes e séries</p>
    </header>

    <section class="controls">
        <input type="text" id="search" placeholder="Buscar título...">
        <select id="category">
            <option value="Todas">Todas</option>
        </select>
        <button id="btnRender">↺ Recarregar</button>
    </section>

    <main>
        <div id="product-list"></div>
    </main>

    <section id="product-details"></section>

    <script src="script.js"></script>
</body>
</html>
